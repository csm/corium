name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: corium_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d corium_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      localstack:
        # S3 conditional-write (If-Match/If-None-Match) support landed
        # incrementally in LocalStack; pin to a major known to enforce it,
        # since the fenced-root race tests below depend on real enforcement.
        image: localstack/localstack:4
        env:
          SERVICES: s3
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      # corium-cljrs and the musicbrainz example are excluded from
      # workspace-wide builds: unified with the cljrs-featured transactor
      # they would compile in no-gc mode. The standalone step below builds
      # them in their intended GC mode.
      - run: cargo clippy --workspace --exclude corium-cljrs --exclude corium-mbrainz --all-targets -- -D warnings
      - run: cargo test --workspace --exclude corium-cljrs --exclude corium-mbrainz
      - name: Test GC-mode cljrs crates (standalone)
        run: |
          cargo clippy -p corium-cljrs -p corium-mbrainz --all-targets -- -D warnings
          cargo test -p corium-cljrs -p corium-mbrainz
      - name: Test PostgreSQL store
        env:
          CORIUM_TEST_POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/corium_test?sslmode=disable
        run: cargo test -p corium-store --features postgres --test postgres
      - name: Test S3 store
        env:
          CORIUM_TEST_S3_BUCKET: corium-test
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
        run: cargo test -p corium-store --features s3 --test s3
